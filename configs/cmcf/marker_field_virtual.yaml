# configs/cmcf/marker_field_virtual.yaml
method: CMCF

# Canonical marker field
marker_count: 100
min_markers_per_part: 3
canonical_index: 0
attachment: surface_nn

# Marker allocation multiplier per part (point_count * weight)
part_weights:
  head: 0.9
  torso: 1.3
  left_upper_arm: 1.0
  left_lower_arm: 1.0
  right_upper_arm: 1.0
  right_lower_arm: 1.0
  left_thigh: 1.15
  left_shin: 1.15
  right_thigh: 1.15
  right_shin: 1.15

# Optional per-part attachment metadata
attachment_by_part: {}
