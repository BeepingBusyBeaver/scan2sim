temporal:
  enabled: true
  hysteresis_margin: 0.04
  window_size: 3
  majority_min_count: 2

swap_validation:
  enabled: true
  min_improvement: 0.0
  prefer_previous: true

consistency:
  enabled: true
  weight: 1.0
  temporal_stickiness: 0.10
  search_topk: 3
  max_iter: 4
  rules:
    - {type: abs_diff_le, heads: [RightKneeX, LeftKneeX], max_diff: 1, penalty: 0.45}
    - {type: abs_diff_le, heads: [RightHipX, LeftHipX], max_diff: 1, penalty: 0.35}
    - {type: abs_diff_le, heads: [RightShoulderX, LeftShoulderX], max_diff: 1, penalty: 0.35}
    - {type: pair_forbidden, heads: [RightHipX, RightKneeX], pairs: [[1, 0]], penalty: 0.55}
    - {type: pair_forbidden, heads: [LeftHipX, LeftKneeX], pairs: [[1, 0]], penalty: 0.55}
    - {type: pair_forbidden, heads: [RightShoulderX, RightElbowY], pairs: [[1, 0]], penalty: 0.30}
    - {type: pair_forbidden, heads: [LeftShoulderX, LeftElbowY], pairs: [[1, 0]], penalty: 0.30}

profiles:
  virtual_contact_v1:
    feature_weight_scale:
      base: 1.0
      contact: 2.2
      overlap: 1.5
      distance: 0.75
      delta: 0.45
    temporal:
      enabled: false
    swap_validation:
      enabled: false
    consistency:
      enabled: true
      weight: 0.8
      temporal_stickiness: 0.0
      search_topk: 3
      max_iter: 4
